imagePullSecrets:
  - name: regcred

backend:
  image:
    repository: ghcr.io/chrislerone/idp-voice-backend
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  image:
    repository: ghcr.io/chrislerone/idp-voice-frontend
    tag: latest
    pullPolicy: Always
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

postgresql:
  enabled: true
  instances: 3
  storage:
    size: 1Gi
  database: recommendations
  owner: app
  # CNPG operator secret name (contains user, password, host, port, dbname)
  # If empty, default to {{ include "idp-voice.fullname" . }}-db-app in templates
  secretName: ""
  # Keys in the CNPG secret
  usernameKey: user
  passwordKey: password
  hostKey: host
  portKey: port
  dbnameKey: dbname

ingress:
  enabled: false
  className: ""
  host: idp-voice.local
  clusterIssuer: zerossl
  annotations: {}
