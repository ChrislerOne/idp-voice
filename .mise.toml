[tools]
java = "temurin-25"
maven = "3.9"
node = "22"

[tasks.backend]
description = "Start Spring Boot backend"
dir = "idp-voice-backend"
run = "mvn spring-boot:run"

[tasks.frontend]
description = "Start Angular dev server"
dir = "idp-voice-frontend"
run = "npx ng serve"

[tasks.dev]
description = "Start backend and frontend"
depends = ["backend", "frontend"]

